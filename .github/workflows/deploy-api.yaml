name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - 'src/types/**'

jobs:
  lint-and-test:
    uses: ./.github/workflows/lint-and-test.yaml

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: lint-and-test
    env:
      IMAGE: australia-southeast1-docker.pkg.dev/uplerr/uplerr/uplerr-api:${{ github.sha }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate with GCP
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json
          gcloud config set project uplerr
          gcloud auth configure-docker australia-southeast1-docker.pkg.dev --quiet

      - name: Build Image
        run: docker build -f src/api/Dockerfile -t $IMAGE .

      - name: Push Image
        run: docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy uplerr-api \
            --image $IMAGE \
            --region australia-southeast1 \
            --project uplerr

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/sa-key.json
