name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - 'src/website/**'
  workflow_dispatch:

jobs:
  lint-and-test:
    uses: ./.github/workflows/lint-and-test.yaml

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install
      - name: Build Website
        run: pnpm --filter @uppler/website build
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}
      - name: Deploy to Cloudflare Pages
        run: pnpm dlx wrangler pages deploy src/website/dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_ID_WEBSITE }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
