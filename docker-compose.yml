services:
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    volumes:
      - ./src/api:/app/src/api
      - ./src/types:/app/src/types
      # prevent host node_modules from shadowing the container's
      - /app/node_modules
      - /app/src/api/node_modules
    environment:
      - NODE_ENV=local
    env_file:
      - ./src/api/.env
    ports:
      - "3000:3000"
